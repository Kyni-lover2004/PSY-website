{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <h2>Вход в личный кабинет</h2>
        <p style="text-align: center; max-width: 500px; margin: 0 auto 30px; color: #666;">
            Войдите, чтобы получить доступ к вашему коду совместимости
        </p>
        
        <div class="form-container">
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="phone">Номер телефона</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+7 (___) ___-__-__">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required placeholder="Ваш пароль">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; color: #666;">
                Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
