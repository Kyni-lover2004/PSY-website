{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <h2>Регистрация</h2>
        <p style="text-align: center; max-width: 500px; margin: 0 auto 30px; color: #666;">
            Создайте аккаунт, чтобы получить доступ к личному кабинету и коду совместимости
        </p>
        
        <div class="form-container">
            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="first_name">Имя *</label>
                    <input type="text" id="first_name" name="first_name" required placeholder="Ваше имя">
                </div>
                
                <div class="form-group">
                    <label for="last_name">Фамилия *</label>
                    <input type="text" id="last_name" name="last_name" required placeholder="Ваша фамилия">
                </div>
                
                <div class="form-group">
                    <label for="phone">Номер телефона *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+7 (___) ___-__-__">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль *</label>
                    <input type="password" id="password" name="password" required placeholder="Придумайте пароль">
                </div>
                
                <div class="form-group">
                    <label for="password_confirm">Подтверждение пароля *</label>
                    <input type="password" id="password_confirm" name="password_confirm" required placeholder="Повторите пароль">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; color: #666;">
                Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
